<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower of Hanoi | Pro Viz</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --disk-gradient: linear-gradient(180deg, #28f815b9 0%, #124f9f 100%);
            --rod-color: #475569;
        }

        body {
            background-color: var(--bg-color);
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-top: 2rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Control Panel */
        .controls {
            background: var(--card-bg);
            padding: 1.5rem 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-bottom: 3rem;
            border: 1px solid #334155;
        }

        input, button, select {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 0.6rem 1rem;
            border-radius: 6px;
            outline: none;
            transition: all 0.2s;
        }

        button {
            background: var(--accent);
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        button:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* The Stage */
        .stage {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 40px;
            height: 350px;
            width: 100%;
            max-width: 900px;
            padding-bottom: 20px;
        }

        .rod-container {
            position: relative;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            width: 200px;
            height: 100%;
        }

        /* The actual wooden/metal rod */
        .rod-shaft {
            position: absolute;
            bottom: 0;
            width: 12px;
            height: 100%;
            background: var(--rod-color);
            border-radius: 6px 6px 0 0;
            z-index: 1;
        }

        /* The base plate */
        .rod-base {
            position: absolute;
            bottom: -10px;
            width: 100%;
            height: 10px;
            background: var(--rod-color);
            border-radius: 4px;
        }

        .disk {
            height: 24px;
            margin-bottom: 2px;
            background: var(--disk-gradient);
            border-radius: 12px;
            z-index: 2;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stats {
            margin-top: 2rem;
            color: var(--accent);
            font-family: monospace;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<h1>Tower of Hanoi</h1>

<div class="controls">
    <div>
        <label>Disks: </label>
        <input type="number" id="diskInput" value="3" min="1" max="8">
    </div>
    <div>
        <label>Speed: </label>
        <select id="speed">
            <option value="800">Slow</option>
            <option value="400" selected>Medium</option>
            <option value="100">Fast</option>
        </select>
    </div>
    <button id="startBtn" onclick="handleStart()">Start Simulation</button>
    <button id="resetBtn" onclick="resetGame()">Reset</button>
</div>

<div class="stage">
    <div class="rod-container" id="rod-A">
        <div class="rod-shaft"></div>
        <div class="rod-base"></div>
    </div>
    <div class="rod-container" id="rod-B">
        <div class="rod-shaft"></div>
        <div class="rod-base"></div>
    </div>
    <div class="rod-container" id="rod-C">
        <div class="rod-shaft"></div>
        <div class="rod-base"></div>
    </div>
</div>

<div class="stats" id="moveCount">Moves: 0</div>

<script>
    let isRunning = false;
    let moveCounter = 0;
    const rods = { A: [], B: [], C: [] };

    function createDisks(n) {
        // Clear previous
        ["A", "B", "C"].forEach(id => {
            const rodEl = document.getElementById(`rod-${id}`);
            const disks = rodEl.querySelectorAll('.disk');
            disks.forEach(d => d.remove());
            rods[id] = [];
        });

        // Create new
        for (let i = n; i >= 1; i--) {
            const disk = document.createElement("div");
            disk.className = "disk";
            disk.style.width = (40 + i * 20) + "px";
            // Staggered colors for visual depth
            disk.style.filter = `hue-rotate(${i * 15}deg)`;
            disk.id = "disk-" + i;
            disk.innerText = i;
            document.getElementById("rod-A").appendChild(disk);
            rods["A"].push(i);
        }
    }

    // Logic: Recursive solver implemented on frontend for zero-latency
    function getHanoiMoves(n, from, to, aux, moves) {
        if (n === 1) {
            moves.push([from, to]);
            return;
        }
        getHanoiMoves(n - 1, from, aux, to, moves);
        moves.push([from, to]);
        getHanoiMoves(n - 1, aux, to, from, moves);
    }

    async function handleStart() {
        if (isRunning) return;
        
        const n = parseInt(document.getElementById("diskInput").value);
        if (isNaN(n) || n < 1 || n > 10) return alert("Please enter 1-10 disks");

        resetGame();
        isRunning = true;
        document.getElementById("startBtn").disabled = true;

        const moves = [];
        getHanoiMoves(n, 'A', 'C', 'B', moves);
        
        const speed = parseInt(document.getElementById("speed").value);

        for (const move of moves) {
            if (!isRunning) break;
            await new Promise(resolve => setTimeout(resolve, speed));
            executeMove(move[0], move[1]);
        }

        isRunning = false;
        document.getElementById("startBtn").disabled = false;
    }

    function executeMove(from, to) {
        const diskId = rods[from].pop();
        rods[to].push(diskId);

        const diskEl = document.getElementById("disk-" + diskId);
        const toRodEl = document.getElementById("rod-" + to);
        
        // Smoothly append to the new rod
        toRodEl.appendChild(diskEl);
        
        moveCounter++;
        document.getElementById("moveCount").innerText = `Moves: ${moveCounter}`;
    }

    function resetGame() {
        isRunning = false;
        moveCounter = 0;
        document.getElementById("moveCount").innerText = `Moves: 0`;
        document.getElementById("startBtn").disabled = false;
        const n = parseInt(document.getElementById("diskInput").value) || 3;
        createDisks(n);
    }

    // Init
    createDisks(3);
</script>

</body>
</html>
