<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding: 50px 0;
        }
        .confirm-container {
            background-color: white;
            padding: 40px;
            border-radius: 5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto;
            border-left: 5px solid #dc3545;
        }
        .confirm-title {
            color: #dc3545;
            margin-bottom: 20px;
        }
        .confirm-message {
            font-size: 1.1rem;
            margin-bottom: 30px;
            color: #495057;
        }
        .registration-info {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 30px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #dee2e6;
        }
        .info-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }
        .info-label {
            font-weight: 600;
            color: #495057;
        }
        .info-value {
            color: #212529;
        }
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="confirm-container">
            <h1 class="confirm-title">Delete Registration</h1>
            
            <p class="confirm-message">
                Are you sure you want to delete this registration? This action cannot be undone.
            </p>

            <div class="registration-info">
                <div class="info-row">
                    <span class="info-label">Participant Name:</span>
                    <span class="info-value">{{ object.participant_name }}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Email:</span>
                    <span class="info-value">{{ object.email }}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Event:</span>
                    <span class="info-value">{{ object.event_name }}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Contact:</span>
                    <span class="info-value">{{ object.contact_number }}</span>
                </div>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="button-group">
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'registration-detail' object.pk %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
