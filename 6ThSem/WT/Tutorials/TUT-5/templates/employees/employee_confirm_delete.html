{% extends 'base.html' %}

{% block title %}Delete {{ employee.get_full_name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger shadow-sm">
      <div class="card-header bg-danger text-white">
        <h5 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Confirm Delete</h5>
      </div>
      <div class="card-body text-center py-4">
        <p class="fs-5">Are you sure you want to delete <strong>{{ employee.get_full_name }}</strong>?</p>
        <p class="text-muted">This action cannot be undone.</p>
        <form method="POST" class="d-flex justify-content-center gap-3 mt-3">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4"><i class="bi bi-trash me-1"></i>Yes, Delete</button>
          <a href="{% url 'employee_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
